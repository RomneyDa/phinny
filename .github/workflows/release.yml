name: Release macOS app

# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) or run manually.
# The build job produces the signed/notarized artifacts; the release job
# publishes them to a GitHub Release. Keeping them separate means a failed
# publish never forces a rebuild, and the build artifacts are always
# downloadable from the run even when no tag triggered a release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build, sign, notarize
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install xcodegen create-dmg

      # The bundled phinny engine is built from cli/ (pure Go, no cgo) and
      # embedded into the app by build-signed-local.sh.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Import Developer ID certificate
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$MAC_CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MAC_CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, notarize
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./scripts/build-signed-local.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Phinny-macos
          path: |
            dist/Phinny.dmg
            dist/Phinny.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only publish a Release for tag pushes; plain workflow_dispatch runs just
    # build the artifacts (available on the run page) without cutting a release.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Phinny-macos
          path: dist

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          # The tag that triggered the run becomes the release.
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/Phinny.dmg
            dist/Phinny.zip
